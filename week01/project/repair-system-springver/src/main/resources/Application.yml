spring:
  datasource:
    url: jdbc:mysql://localhost:3306/repair_system?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.dorm.entity

server:
  port: 8081
# JWT 配置
# 密钥已更改为环境变量
jwt:
  secret: ${SECRET_KEY}
  expiration: 86400000  # 有效时间24小时，这里是用单位毫秒表示